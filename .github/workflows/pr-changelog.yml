name: PR Changelog & Docs Automation (Reusable)

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog-and-docs:
    runs-on: ubuntu-latest
    name: Update Changelog, README & Qlik Script

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Checkout automation-repo (voor scripts)
        uses: actions/checkout@v4
        with:
          repository: bitmetric-bv/qlik-git-automation
          path: automation

      - name: Run PR automation script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_FULL_NAME: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python automation/.github/scripts/pr_automation.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om te committen."
          else
            git commit -m "chore: automatisch changelog & docs bijgewerkt via PR #${{ github.event.pull_request.number }}"
            git push origin HEAD:${{ github.head_ref }}
          fi