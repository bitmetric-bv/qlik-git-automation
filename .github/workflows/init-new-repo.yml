name: Init New Repository

on:
  repository_dispatch:
    types: [repo-created]

jobs:
  init-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Validate payload
        run: |
          echo "Event type: ${{ github.event.action }}"
          echo "Payload: ${{ toJson(github.event.client_payload) }}"

          if [ -z "${{ github.event.client_payload.repository }}" ]; then
            echo "ERROR: No repository provided in payload"
            exit 1
          fi

      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run init script
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT }}
          REPO_NAME: ${{ github.event.client_payload.repository }}
          ORG_NAME: ${{ github.event.client_payload.organization }}
          EVENT_TYPE: ${{ github.event.action }}
        run: python .github/scripts/init_repo.py
